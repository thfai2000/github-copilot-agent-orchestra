name: Create Release Tag

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TOKEN: ${{ secrets['RELEASE_TOKEN'] }}
    steps:
      - name: Ensure release token is configured
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "Missing repository secret RELEASE_TOKEN. Use a personal access token with permission to push tags and trigger downstream workflows." >&2
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main
          token: ${{ secrets['RELEASE_TOKEN'] }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read release version from package.json
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "package.json version must be a semantic version, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.release.outputs.tag }} already exists." >&2
            exit 1
          fi

      - name: Create and push release tag
        run: |
          git tag -a "${{ steps.release.outputs.tag }}" -m "Release ${{ steps.release.outputs.version }}"
          git push origin "${{ steps.release.outputs.tag }}"