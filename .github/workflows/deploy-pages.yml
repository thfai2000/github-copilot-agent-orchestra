# ============================================================================
# deploy-pages.yml — Build latest docs from main and recent tagged snapshots
# Deploys VitePress docs + Helm chart index to GitHub Pages
# ============================================================================
name: Deploy Docs & Helm Chart

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DOCS_VERSION_LIMIT: '5'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install dependencies
        run: npm ci

      - name: Build latest docs and tagged snapshots
        run: npm run docs:site

      - name: Copy Artifact Hub repo file
        run: cp artifacthub-repo.yml docs-dist/artifacthub-repo.yml

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-dist
