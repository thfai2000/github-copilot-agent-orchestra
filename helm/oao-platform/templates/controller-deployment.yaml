apiVersion: apps/v1
kind: Deployment
metadata:
  name: oao-controller
  namespace: {{ .Values.namespace }}
  labels:
    app: oao-controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app: oao-controller
  template:
    metadata:
      labels:
        app: oao-controller
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      serviceAccountName: oao-controller
      containers:
        - name: controller
          image: {{ .Values.coreImage }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              DB_HOST="${POSTGRES_CLIENT_SERVICE_HOST:-postgres-client}"
              REDIS_HOST="${REDIS_SERVICE_HOST:-redis}"
              API_HOST="${OAO_API_SERVICE_HOST:-oao-api}"
              if [ -n "${POSTGRES_CLIENT_SERVICE_HOST:-}" ]; then
                export AGENT_DATABASE_URL="$(printf '%s' "$AGENT_DATABASE_URL" | sed "s/@postgres-client:/@${DB_HOST}:/; s/@postgres:/@${DB_HOST}:/")"
              fi
              if [ -n "${REDIS_SERVICE_HOST:-}" ]; then
                export REDIS_URL="$(printf '%s' "$REDIS_URL" | sed "s#redis://redis:#redis://${REDIS_HOST}:#")"
              fi
              if [ -n "${OAO_API_SERVICE_HOST:-}" ]; then
                export OAO_PLATFORM_API_URL="$(printf '%s' "$OAO_PLATFORM_API_URL" | sed "s#://oao-api:#://${API_HOST}:#")"
              fi
              exec node --import tsx packages/oao-api/src/workers/controller.ts
          envFrom:
            - configMapRef:
                name: oao-platform-config
            - secretRef:
                name: oao-platform-secrets
          env:
            - name: AGENT_POD_IMAGE
              value: {{ .Values.coreImage }}
            - name: AGENT_POD_MEMORY_REQUEST
              value: {{ .Values.agentPod.resources.requests.memory | quote }}
            - name: AGENT_POD_CPU_REQUEST
              value: {{ .Values.agentPod.resources.requests.cpu | quote }}
            - name: AGENT_POD_MEMORY_LIMIT
              value: {{ .Values.agentPod.resources.limits.memory | quote }}
            - name: AGENT_POD_CPU_LIMIT
              value: {{ .Values.agentPod.resources.limits.cpu | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: {{ .Values.controller.resources.requests.memory }}
              cpu: {{ .Values.controller.resources.requests.cpu }}
            limits:
              memory: {{ .Values.controller.resources.limits.memory }}
              cpu: {{ .Values.controller.resources.limits.cpu }}
