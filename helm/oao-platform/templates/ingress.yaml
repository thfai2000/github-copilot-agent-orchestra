apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oao-ingress
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: nginx
  rules:
    - host: oao.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: oao-api
                port:
                  number: {{ .Values.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oao-ui
                port:
                  number: {{ .Values.ui.port }}
