apiVersion: apps/v1
kind: Deployment
metadata:
  name: oao-api
  namespace: {{ .Values.namespace }}
  labels:
    app: oao-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: oao-api
  template:
    metadata:
      labels:
        app: oao-api
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      containers:
        - name: oao-api
          image: {{ .Values.coreImage }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              DB_HOST="${POSTGRES_CLIENT_SERVICE_HOST:-postgres-client}"
              REDIS_HOST="${REDIS_SERVICE_HOST:-redis}"
              API_HOST="${OAO_API_SERVICE_HOST:-oao-api}"
              if [ -n "${POSTGRES_CLIENT_SERVICE_HOST:-}" ]; then
                export AGENT_DATABASE_URL="$(printf '%s' "$AGENT_DATABASE_URL" | sed "s/@postgres-client:/@${DB_HOST}:/; s/@postgres:/@${DB_HOST}:/")"
              fi
              if [ -n "${REDIS_SERVICE_HOST:-}" ]; then
                export REDIS_URL="$(printf '%s' "$REDIS_URL" | sed "s#redis://redis:#redis://${REDIS_HOST}:#")"
              fi
              if [ -n "${OAO_API_SERVICE_HOST:-}" ]; then
                export OAO_PLATFORM_API_URL="$(printf '%s' "$OAO_PLATFORM_API_URL" | sed "s#://oao-api:#://${API_HOST}:#")"
              fi
              exec node --import tsx packages/oao-api/src/server.ts
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: oao-platform-config
            - secretRef:
                name: oao-platform-secrets
          resources:
            requests:
              memory: {{ .Values.api.resources.requests.memory }}
              cpu: {{ .Values.api.resources.requests.cpu }}
            limits:
              memory: {{ .Values.api.resources.limits.memory }}
              cpu: {{ .Values.api.resources.limits.cpu }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: oao-api
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: oao-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
