apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: agent-ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: agent-ui
  template:
    metadata:
      labels:
        app: agent-ui
    spec:
      containers:
        - name: agent-ui
          image: {{ .Values.ui.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.ui.port }}
          env:
            - name: NUXT_API_BASE_URL
              value: "http://agent-api:{{ .Values.api.port }}"
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: agent-ui
  namespace: {{ .Values.namespace }}
spec:
  type: LoadBalancer
  selector:
    app: agent-ui
  ports:
    - port: {{ .Values.ui.port }}
      targetPort: {{ .Values.ui.port }}
